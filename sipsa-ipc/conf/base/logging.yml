version: 1
disable_existing_loggers: false

formatters:
  simple:
    format: "[%(asctime)s] %(name)s — %(levelname)s — %(message)s"
    datefmt: "%H:%M:%S"

handlers:
  console:
    class: logging.StreamHandler
    level: INFO
    formatter: simple
    stream: ext://sys.stdout

  file:
    class: logging.FileHandler
    level: DEBUG
    formatter: simple
    filename: logs/sipsa_abastecimiento.log

loggers:
  kedro:
    level: INFO
  sipsa_abastecimiento:
    level: DEBUG

root:
  level: INFO
  handlers: [console]
